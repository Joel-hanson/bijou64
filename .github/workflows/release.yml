name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native library
        run: ./build-native.sh

      - name: Build and test
        run: mvn -B clean verify -Dgpg.skip=true

      - name: Build perf module
        run: ./perf/kafka/scripts/build.sh

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/bijou64-${{ steps.version.outputs.version }}.jar
            target/bijou64-${{ steps.version.outputs.version }}-sources.jar
            perf/kafka/target/bijou64-kafka-serializers-${{ steps.version.outputs.version }}.jar
            perf/kafka/target/bijou64-kafka-serializers-${{ steps.version.outputs.version }}-sources.jar
          body: |
            # Bijou64 Release ${{ steps.version.outputs.version }}

            See [CHANGELOG](CHANGELOG.md) for details.

            ## Artifacts

            - `bijou64-${{ steps.version.outputs.version }}.jar` - Core library
            - `bijou64-kafka-serializers-${{ steps.version.outputs.version }}.jar` - Kafka Serializer/Deserializer implementations

            ## Integration

            Add to your Maven project:

            ```xml
            <dependency>
              <groupId>org.bijou64</groupId>
              <artifactId>bijou64</artifactId>
              <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```

            See [README](README.md) for usage instructions.

      - name: Upload artifacts to GitHub Packages
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          mvn -B deploy -Pgithub-packages -DskipTests -Dgpg.skip=true
          mvn -B deploy -Pgithub-packages -DskipTests -Dgpg.skip=true -f perf/kafka/pom.xml

  build-matrix:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build (native)
        run: ./build-native.sh
        if: runner.os != 'Windows'

      - name: Build (Java)
        run: mvn -B clean package -DskipTests
