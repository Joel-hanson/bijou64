name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    services:
      kafka:
        image: apache/kafka:4.3.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_NUM_PARTITIONS: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build native library
        run: ./build-native.sh

      - name: Build and test
        run: mvn -B clean verify -Dgpg.skip=true

      - name: Build perf module
        run: ./perf/kafka/scripts/build.sh

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Wait for Kafka
        run: |
          echo "Waiting for Kafka to start..."
          for i in {1..30}; do
            nc -z localhost 9092 && echo "Kafka is up!" && exit 0
            sleep 2
          done
          echo "Kafka failed to start"
          exit 1

      - name: Run Kafka producer benchmarks
        run: |
          cd perf/kafka
          ./scripts/compare-benchmarks.sh --ci --distribution sequential 50000 2 \
            bijou64-benchmark-topic localhost:9092
        timeout-minutes: 20

      - name: Run JMH benchmarks
        run: |
          mkdir -p release-assets
          mvn -B -Pjmh -DskipTests -Dgpg.skip=true package
          java -jar target/benchmarks.jar -wi 2 -i 3 -f 1 -rf json -rff release-assets/jmh-results.json

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp "$(ls -t perf/kafka/logs/results-*.csv | head -1)" release-assets/kafka-benchmark-results.csv

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/bijou64-${{ steps.version.outputs.version }}.jar
            target/bijou64-${{ steps.version.outputs.version }}-sources.jar
            target/bijou64-${{ steps.version.outputs.version }}-javadoc.jar
            perf/kafka/target/bijou64-kafka-serializers-${{ steps.version.outputs.version }}.jar
            perf/kafka/target/bijou64-kafka-serializers-${{ steps.version.outputs.version }}-sources.jar
            perf/kafka/target/bijou64-kafka-serializers-${{ steps.version.outputs.version }}-javadoc.jar
            release-assets/kafka-benchmark-results.csv
            release-assets/jmh-results.json
          body: |
            # Bijou64 Release ${{ steps.version.outputs.version }}

            See [CHANGELOG](CHANGELOG.md) for details.

            ## Artifacts

            - `bijou64-${{ steps.version.outputs.version }}.jar` - Core library
            - `bijou64-kafka-serializers-${{ steps.version.outputs.version }}.jar` - Kafka Serializer/Deserializer implementations
            - `kafka-benchmark-results.csv` - Kafka producer benchmark results (CI subset, sequential distribution)
            - `jmh-results.json` - JMH encode/decode microbenchmark results

            ## Integration

            Add to your Maven project:

            ```xml
            <dependency>
              <groupId>org.bijou64</groupId>
              <artifactId>bijou64</artifactId>
              <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```

            See [README](README.md) for usage instructions.

      - name: Configure Maven for GitHub Packages
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          user_json=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${GH_PACKAGES_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user)
          http_code=$(echo "$user_json" | tail -n1)
          if [ "$http_code" != "200" ]; then
            echo "GH_PACKAGES_TOKEN failed GitHub API auth (HTTP ${http_code})."
            echo "Use a classic PAT with write:packages (and repo for private repos), or a fine-grained PAT with Packages: Read and write on this repository."
            exit 1
          fi
          github_user=$(echo "$user_json" | sed '$d' | jq -r .login)
          echo "Publishing to GitHub Packages as ${github_user}"
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${github_user}</username>
                <password>${GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Upload artifacts to GitHub Packages
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          mvn -B deploy -Pgithub-packages -DskipTests -Dgpg.skip=true
          mvn -B deploy -Pgithub-packages -DskipTests -Dgpg.skip=true -f perf/kafka/pom.xml

  build-matrix:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build (native)
        run: ./build-native.sh
        if: runner.os != 'Windows'

      - name: Build (Java)
        run: mvn -B clean package -DskipTests
