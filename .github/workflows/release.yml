name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    services:
      kafka:
        image: apache/kafka:4.3.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_NUM_PARTITIONS: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build native library
        run: ./scripts/build-native.sh

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set project version from tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mvn -B org.codehaus.mojo:versions-maven-plugin:2.16.2:set \
            -DnewVersion="${VERSION}" -DgenerateBackupPoms=false
          mvn -B org.codehaus.mojo:versions-maven-plugin:2.16.2:set \
            -DnewVersion="${VERSION}" -DgenerateBackupPoms=false -f perf/kafka/pom.xml

      - name: Build and test
        run: mvn -B clean verify -Dgpg.skip=true

      - name: Build perf module
        run: |
          mvn -B install -DskipTests -Dgpg.skip=true
          mvn -B package -DskipTests -Dgpg.skip=true -f perf/kafka/pom.xml

      - name: Wait for Kafka
        run: |
          echo "Waiting for Kafka to start..."
          for i in {1..30}; do
            nc -z localhost 9092 && echo "Kafka is up!" && exit 0
            sleep 2
          done
          echo "Kafka failed to start"
          exit 1

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/bijou64-${{ steps.version.outputs.version }}.jar
            target/bijou64-${{ steps.version.outputs.version }}-sources.jar
            target/bijou64-${{ steps.version.outputs.version }}-javadoc.jar
            perf/kafka/target/bijou64-kafka-serializers-${{ steps.version.outputs.version }}.jar
            perf/kafka/target/bijou64-kafka-serializers-${{ steps.version.outputs.version }}-sources.jar
            perf/kafka/target/bijou64-kafka-serializers-${{ steps.version.outputs.version }}-javadoc.jar
          body: |
            # Bijou64 Release ${{ steps.version.outputs.version }}

            See [CHANGELOG](CHANGELOG.md) for details.

            ## Artifacts

            - `bijou64-${{ steps.version.outputs.version }}.jar` - Core library
            - `bijou64-kafka-serializers-${{ steps.version.outputs.version }}.jar` - Kafka Serializer/Deserializer implementations

            ## Integration

            Add to your Maven project:

            ```xml
            <dependency>
              <groupId>org.bijou64</groupId>
              <artifactId>bijou64</artifactId>
              <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```

            See [README](README.md) for usage instructions.

      - name: Configure Maven for GitHub Packages
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          user_json=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${GH_PACKAGES_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user)
          http_code=$(echo "$user_json" | tail -n1)
          if [ "$http_code" != "200" ]; then
            echo "GH_PACKAGES_TOKEN failed GitHub API auth (HTTP ${http_code})."
            echo "Use a classic PAT with write:packages (and repo for private repos), or a fine-grained PAT with Packages: Read and write on this repository."
            exit 1
          fi
          github_user=$(echo "$user_json" | sed '$d' | jq -r .login)
          echo "Publishing to GitHub Packages as ${github_user}"
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${github_user}</username>
                <password>${GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/Joel-hanson/bijou64</url>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Upload artifacts to GitHub Packages
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail

          deploy_or_skip_if_exists() {
            local log
            log=$(mktemp)
            if mvn -B deploy "$@" >"$log" 2>&1; then
              cat "$log"
              rm -f "$log"
              return 0
            fi
            cat "$log"
            if grep -qE 'status code: 409|Conflict \(409\)' "$log"; then
              echo "Version already published to GitHub Packages; continuing."
              rm -f "$log"
              return 0
            fi
            rm -f "$log"
            return 1
          }

          mvn -B install -Pgithub-packages -DskipTests -Dgpg.skip=true
          deploy_or_skip_if_exists -Pgithub-packages -DskipTests -Dgpg.skip=true
          deploy_or_skip_if_exists -Pgithub-packages -DskipTests -Dgpg.skip=true -f perf/kafka/pom.xml

  build-matrix:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build (native)
        run: ./scripts/build-native.sh
        if: runner.os != 'Windows'

      - name: Build (Java)
        run: mvn -B clean package -DskipTests
