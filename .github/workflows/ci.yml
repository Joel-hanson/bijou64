name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build native library
        run: ./build-native.sh

      - name: Run tests
        run: mvn -B clean verify -Dgpg.skip=true

      - name: Build perf module
        run: ./perf/kafka/scripts/build.sh

  test-matrix:
    name: Test on ${{ matrix.os }} with Java ${{ matrix.java }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        java: ["17", "21"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"
          cache: maven

      - name: Build native library
        run: ./build-native.sh
        if: runner.os != 'Windows'

      - name: Run tests
        run: mvn -B clean test -Dgpg.skip=true

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      kafka:
        image: apache/kafka:4.3.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_NUM_PARTITIONS: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build native library
        run: ./build-native.sh

      - name: Install and build
        run: |
          mvn -B clean install -DskipTests -Dgpg.skip=true
          mvn -B -f perf/kafka/pom.xml clean package -DskipTests -Dgpg.skip=true

      - name: Wait for Kafka
        run: |
          echo "Waiting for Kafka to start..."
          for i in {1..30}; do
            nc -z localhost 9092 && echo "Kafka is up!" && exit 0
            sleep 2
          done
          echo "Kafka failed to start"
          exit 1

      - name: Run comparative benchmarks
        run: |
          cd perf/kafka
          ./scripts/compare-benchmarks.sh --ci --distribution sequential 50000 2 \
            bijou64-benchmark-topic localhost:9092
        timeout-minutes: 20

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            perf/kafka/logs/
          retention-days: 30

  jmh:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build native library
        run: ./build-native.sh

      - name: Run JMH benchmarks
        run: |
          mvn -B -Pjmh -DskipTests -Dgpg.skip=true package
          java -jar target/benchmarks.jar -wi 2 -i 3 -f 1 -rf json -rff target/jmh-results.json

      - name: Upload JMH results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmh-results
          path: target/jmh-results.json
          retention-days: 30
